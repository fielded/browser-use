tests:
  - name: Go to Login Page
    task: Navigate to https://staging.shelflife.field.supply/login

  - name: Open Forgot Password
    task: Click on the "Forgot Password" link on the login form

  - name: Enter Email Address
    task: Enter "katherine+100@field.partners" in the email input field for password reset

  - name: Submit Reset Request
    task: Click the "Send reset email" button to submit the request

  - name: Confirm Success
    task: Look for the phrase 'Return to login' on the page
